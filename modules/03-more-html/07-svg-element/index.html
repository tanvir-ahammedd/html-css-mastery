<!DOCTYPE html>

<head>

  <title>Complete SVG Example</title>

  <style>
    .blob {
      width: 300px;

</head>
<body>

  <h1>SVG Demo</h1>

  <!-- Circle with Text -->

    <circle 
      cx="100" 
      cy="100" 
      r="80" 
      fill="blue"
      stroke="black"
      stroke-width="5" />

    <text 
      x="45" 
      y="115"
      fill="white"
      font-size="40"
      font-family="Verdana">
      SVG
    </text>

  </svg>
