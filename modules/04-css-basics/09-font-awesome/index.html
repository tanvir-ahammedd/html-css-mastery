<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Font Awesome Tutorial</title>

  <!-- Font Awesome CDN -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h2>Icon Examples</h2>

  <p><i class="fa-solid fa-check"></i> Success</p>
  <p><i class="fa-solid fa-xmark"></i> Error</p>
  <p><i class="fa-solid fa-triangle-exclamation"></i> Warning</p>
  <p><i class="fa-solid fa-circle-info"></i> Info</p>

  <h2>Social Icons</h2>

  <i class="fa-brands fa-facebook"></i>
  <i class="fa-brands fa-twitter"></i>
  <i class="fa-brands fa-instagram"></i>

</body>
</html>
