<!DOCTYPE html>
<html>
<head>
  <title>Div and Span Tutorial</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
    }

    /* Header */
    .header {
      background: #333;
      color: white;
      padding: 15px;
    }

    /* Navigation */
    .nav a {
      color: white;
      margin-right: 10px;
      text-decoration: none;
    }

    /* Sections */
    .section {
      padding: 20px;
      border-bottom: 1px solid #ccc;
    }

    /* Highlight text (span) */
    .highlight {
      color: red;
      font-weight: bold;
    }

    /* Footer */
    .footer {
      background: black;
      color: white;
      text-align: center;
      padding: 10px;
    }
  </style>

</head>
<body>

  <!-- Header -->
  <div class="header">
    <h1>My Website</h1>

    <div class="nav">
      <a href="#">Home</a>
      <a href="#">About</a>
      <a href="#">Contact</a>
    </div>
  </div>

  <!-- Section 1 -->
  <div class="section">
    <h2>This is <span class="highlight">Section 1</span></h2>
    <p>This is the first paragraph in section one.</p>
    <p>This is the second paragraph in section one.</p>
  </div>

  <!-- Section 2 -->
  <div class="section">
    <h2>This is <span class="highlight">Section 2</span></h2>
    <p>This is the first paragraph in section two.</p>
    <p>This is the second paragraph in section two.</p>
  </div>

  <!-- Footer -->
  <div class="footer">
    <p>&copy; 2026 My Website</p>
  </div>

</body>
</html>
