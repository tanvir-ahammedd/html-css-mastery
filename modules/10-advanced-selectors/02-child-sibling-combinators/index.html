<!DOCTYPE html>
<html>
<head>
  <title>Combinators Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>Title</h1>

  <a href="#">Link right after H1</a>

  <p>Direct paragraph</p>

  <div>
    <p>Paragraph inside div</p>
    <a href="#">Link inside div</a>
  </div>

  <ul>
    <li>
      <p>Paragraph inside list</p>
    </li>
  </ul>

  <a href="#">Last link</a>
</div>

</body>
</html>
