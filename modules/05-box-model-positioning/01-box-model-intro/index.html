<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CSS Box Model Tutorial</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>CSS Box Model Demo</h1>

  <div class="box box1">
    This is Box 1 (content area)
  </div>

  <div class="box box2">
    This is Box 2 (different spacing)
  </div>

  <div class="container">
    <p>
      This container uses max-width for responsive design.
      Resize the screen to see the effect.
    </p>
  </div>

</body>
</html>
