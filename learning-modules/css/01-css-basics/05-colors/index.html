<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CSS Colors Tutorial</title>

  <!-- Link CSS file -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1 class="name">Color Name Example (Red)</h1>

  <div class="card hex">
    HEX Example (#ffffff text on black background)
  </div>

  <div class="card rgb">
    RGB Example (Red background)
  </div>

  <div class="card rgba">
    RGBA Example (Transparent black background)
  </div>

  <div class="card hsl">
    HSL Example
  </div>

  <div class="card hsla">
    HSLA Example (Transparent)
  </div>

  <div class="card opacity-box">
    Opacity Example (Text ALSO faded ❌)
  </div>

</body>
</html>
