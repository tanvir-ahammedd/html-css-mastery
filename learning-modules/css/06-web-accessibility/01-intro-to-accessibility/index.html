<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Accessible Website</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>My Website</h1>

    <nav>
      <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">About our services</a></li>
        <li><a href="#">Contact us</a></li>
      </ul>
    </nav>
  </header>

  <main>

    <section>
      <h2>Welcome</h2>

      <!-- Accessible image -->
      <img src="dog.jpg" alt="A brown dog playing in the park">

      <p>This is an accessible website example.</p>
    </section>

    <!-- Accessible form -->
    <section>
      <h2>Contact Form</h2>

      <form>

        <!-- Label connected to input -->
        <label for="name">Name:</label>
        <input id="name" type="text">

        <label for="email">Email:</label>
        <input id="email" type="email">

        <button type="submit">Submit form</button>
      </form>
    </section>

  </main>
  <footer>
    <p>&copy; 2026 My Website</p>
  </footer>

</body>
</html>
