<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pricing Grid</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100;300;400;600;700&display=swap" rel="stylesheet">

  <!-- Icons -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <div class="pricing">

      <!-- Card 1 -->
      <div class="card card-free">
        <h2>Free</h2>
        <p class="price"><sup>$</sup>0 <span>/mo</span></p>
        <p class="main-text">Basic features for personal use</p>

        <a href="#" class="btn">Get Started</a>

        <ul>
          <li><i class="fas fa-check"></i> Feature 1</li>
          <li><i class="fas fa-check"></i> Feature 2</li>
          <li><i class="fas fa-check"></i> Feature 3</li>
        </ul>
      </div>

      <!-- Card 2 -->
      <div class="card card-pro">
        <h2>Pro</h2>
        <p class="price"><sup>$</sup>29 <span>/mo</span></p>
        <p class="main-text">Best for professionals</p>

        <a href="#" class="btn btn-primary">Get Started</a>

        <ul>
          <li><i class="fas fa-check"></i> Feature 1</li>
          <li><i class="fas fa-check"></i> Feature 2</li>
          <li><i class="fas fa-check"></i> Feature 3</li>
        </ul>
      </div>

      <!-- Card 3 -->
      <div class="card card-enterprise">
        <h2>Enterprise</h2>
        <p class="price"><sup>$</sup>99 <span>/mo</span></p>
        <p class="main-text">For large teams</p>

        <a href="#" class="btn">Get Started</a>

        <ul>
          <li><i class="fas fa-check"></i> Feature 1</li>
          <li><i class="fas fa-check"></i> Feature 2</li>
          <li><i class="fas fa-check"></i> Feature 3</li>
        </ul>
      </div>

    </div>
  </div>

</body>
</html>
