<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Other Input Types</title>
</head>
<body>

<h1>Other Input Types</h1>

<form action="#" method="POST">

  <label>Color</label><br>
  <input type="color" name="color"><br><br>

  <label>Date</label><br>
  <input type="date" name="date"><br><br>

  <label>Time</label><br>
  <input type="time" name="time"><br><br>

  <label>Month</label><br>
  <input type="month" name="month"><br><br>

  <label>Range</label><br>
  <input type="range" name="range" min="0" max="100" step="5"><br><br>

  <label>Website</label><br>
  <input type="url" name="website" placeholder="https://example.com"><br><br>

  <label>File Upload</label><br>
  <input type="file" name="file"><br><br>

  <button type="submit">Submit</button>

</form>

</body>
</html>
