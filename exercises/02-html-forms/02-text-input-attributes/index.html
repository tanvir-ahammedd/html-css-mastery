<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Input Attributes</title>
</head>
<body>

<h1>Input Attributes</h1>

<form action="#" method="POST">

  <div>
    <label for="name">Name</label><br>
    <input 
      type="text"
      id="name"
      name="name"
      placeholder="Enter name"
      required
      minlength="3"
      maxlength="20"
    >
  </div>

  <br>

  <div>
    <label for="email">Email</label><br>
    <input 
      type="email"
      id="email"
      name="email"
      value="test@example.com"
      readonly
    >
  </div>

  <br>

  <div>
    <label for="password">Password</label><br>
    <input 
      type="password"
      id="password"
      name="password"
      required
      minlength="6"
    >
  </div>

  <br>

  <div>
    <label for="username">Username (pattern)</label><br>
    <input 
      type="text"
      id="username"
      name="username"
      pattern="[A-Za-z0-9]+"
      title="Only letters and numbers"
    >
  </div>

  <br>

  <button type="submit">Submit</button>

</form>

</body>
</html>
