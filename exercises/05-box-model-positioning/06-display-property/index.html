<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Display Property Tutorial</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>CSS Display Property Demo</h1>

  <!-- DISPLAY NONE -->
  <h2 class="none-el">I am display: none</h2>

  <!-- VISIBILITY HIDDEN -->
  <h2 class="hidden-el">I am visibility: hidden</h2>

  <p>This paragraph shows layout difference.</p>

  <hr>

  <!-- BLOCK vs INLINE -->
  <h2>Block vs Inline</h2>

  <p class="inline-text">Paragraph 1</p>
  <p class="inline-text">Paragraph 2</p>

  <br><br>

  <a href="#">Link 1</a>
  <a href="#">Link 2</a>

  <hr>

  <!-- INLINE-BLOCK -->
  <h2>Inline-Block Example (Buttons)</h2>

  <a href="#" class="btn">Button 1</a>
  <a href="#" class="btn">Button 2</a>

</body>
</html>
