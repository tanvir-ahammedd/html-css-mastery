<head>

  <title>HTML Tables</title>
</head>

<body>

  <h1>HTML & CSS Sandbox - Tables</h1>

    <thead>
      <tr>
        <th>First Name</th>
        <th>Last Name</th>
        <th>Email</th>
        <th colspan="2">Telephone Numbers</th>
      </tr>
    </thead>

    <tbody>

        <td>+880 1712-345678</td>
        <td>+880 1912-987654</td>
      </tr>

      <tr>
        <td>Rahim</td>
        <td>Khan</td>
        <td>rahim.khan@example.com</td>
        <td>+880 1812-112233</td>
        <td>+880 1612-445566</td>
      </tr>
    </tbody>

  </table>

</body>
</html>
