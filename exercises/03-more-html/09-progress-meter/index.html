<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Progress & Meter Demo</title>

  <style>
    body {
      font-family: Arial;
      padding: 20px;
    }

    meter::-webkit-meter-optimum-value {
      background: violet;
    }
  </style>
</head>
<body>

  <h2>Progress Example</h2>

  <label for="file">File Upload:</label><br>
  <progress id="file" value="70" max="100">70%</progress>

  <h2>Meter Example</h2>

  <label for="fuel">Fuel Level:</label><br>
  <meter
    id="fuel"
    value="50"
    min="0"
    max="100"
    low="30"
    high="90"
    optimum="80">
    50 out of 100
  </meter>

</body>
</html>
