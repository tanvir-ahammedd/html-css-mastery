<!DOCTYPE html>
<html>
<head>
  <title>Block vs Inline</title>

  <style>
    /* Block elements */
    p {
      background: lightgray;
      padding: 10px;
      margin-bottom: 10px;
    }

    /* Inline elements */
    a {
      background: gray;
      padding: 5px;
      margin-right: 10px;
      text-decoration: none;
      color: white;
    }

    /* For testing margin-bottom */
    .test {
      background: orange;
      padding: 10px;
      margin-top: 20px;
    }
  </style>

</head>
<body>

  <h1>Block Elements</h1>

  <p>This is paragraph one</p>
  <p>This is paragraph two</p>

  <h1>Inline Elements</h1>

  <a href="#">Link One</a>
  <a href="#">Link Two</a>

  <p class="test">Element below inline links</p>

</body>
</html>
