<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Image Tutorial</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>HTML Image Tutorial</h1>

  <!-- Relative Image -->
  <h2>Local Image</h2>
  <img src="images/landscape.jpg" alt="Landscape" class="img">

  <!-- Absolute Image -->
  <h2>Online Image</h2>
  <img src="https://picsum.photos/200/300" alt="Random Image">

  <!-- Image with size -->
  <h2>Image with Width & Height</h2>
  <img src="images/landscape.jpg" alt="Landscape" width="400" height="300">

  <!-- Image with title -->
  <h2>Hover Example</h2>
  <img src="images/landscape.jpg" alt="Landscape" title="A beautiful landscape">

  <!-- Figure with caption -->
  <h2>Figure Example</h2>
  <figure>
    <img src="images/landscape.jpg" alt="Landscape" class="img">
    <figcaption>Fig 1: Beautiful landscape</figcaption>
  </figure>

</body>
</html>
