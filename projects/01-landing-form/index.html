<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Fonts & Icons -->
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet" />

  <!-- Styles -->
  <link rel="stylesheet" href="css/styles.css" />
  <title>Bono App | Contact</title>
</head>

<body>
  <div class="wrapper">

    <!-- Header -->
    <header class="header">
      <a href="index.html">
        <img class="logo" src="images/logo.svg" alt="Bono Logo" />
      </a>

      <div class="header-right">
        <div><i class="fas fa-envelope"></i> tanvir7535@gmail.com</div>
        <div><i class="fas fa-phone"></i> 01789374987</div>
        <a href="#"><i class="fa-brands fa-twitter"></i></a>
      </div>
    </header>

    <!-- Main -->
    <main class="main-content">

      <!-- Form -->
      <form>
        <div class="form-group">
          <label for="name">Name</label>
          <input type="text" id="name" required />
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" required />
        </div>

        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message"></textarea>
        </div>

        <button type="submit" class="btn">Submit</button>
      </form>

      <!-- Text -->
      <div class="text-container">
        <h1>Coming Soon For Every Developer</h1>
        <p>
          Our new Bono web app will change the way you think about content
          management and help you focus on what matters most.
        </p>
      </div>

    </main>
  </div>
</body>
</html>
